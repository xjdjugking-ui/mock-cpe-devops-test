<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CPE Gateway{% endblock %} — CPE Management Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-layout">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">G</div>
      <div>
        <div class="brand-name">CPE Gateway</div>
        <div class="brand-sub">Management Console</div>
      </div>
    </div>

    <div class="nav-section-label">主菜单</div>
    <ul>
      <li>
        <a href="/dashboard" class="nav-item {% if active=='dashboard' %}active{% endif %}">
          <span class="nav-icon">▦</span> 控制台
        </a>
      </li>
      <li>
        <a href="/network" class="nav-item {% if active=='network' %}active{% endif %}">
          <span class="nav-icon">◎</span> 网络配置
        </a>
      </li>
      <li>
        <a href="/upgrade" class="nav-item {% if active=='upgrade' %}active{% endif %}">
          <span class="nav-icon">⬆</span> 固件升级
        </a>
      </li>
      <li>
        <a href="/diagnostics" class="nav-item {% if active=='diagnostics' %}active{% endif %}">
          <span class="nav-icon">◉</span> 运行诊断
        </a>
      </li>
    </ul>

    <div class="nav-section-label">DevOps</div>
    <ul>
      <li>
        <a href="/artifacts" class="nav-item {% if active=='artifacts' %}active{% endif %}">
          <span class="nav-icon">▤</span> 固件制品
        </a>
      </li>
      <li>
        <a href="/jobs" class="nav-item {% if active=='jobs' %}active{% endif %}">
          <span class="nav-icon">▷</span> 升级任务
        </a>
      </li>
      <li>
        <a href="/stats" class="nav-item {% if active=='stats' %}active{% endif %}">
          <span class="nav-icon">≡</span> 实验统计
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      CPE-GW-X300 &nbsp;|&nbsp; Mock v1.0
    </div>
  </nav>

  <!-- ── Main area ── -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">{% block page_title %}{% endblock %}</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-badge">CPE-GW-X300</span>
        <span class="topbar-badge">固件 v2.1.0</span>
        <div class="topbar-user">
          <div class="user-avatar">A</div>
          <span>admin</span>
        </div>
        <a href="/logout" class="logout-link">退出</a>
      </div>
    </header>

    <!-- Content -->
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

  </div><!-- /main-area -->
</div><!-- /app-layout -->
</body>
</html>
