<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CPE DevOps{% endblock %} — CPE DevOps Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <a class="sidebar-brand" href="/dashboard">
      <div class="sidebar-brand-icon">&#9881;</div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">CPE DevOps</span>
        <span class="sidebar-brand-sub">TESTING CONSOLE</span>
      </div>
    </a>

    <div class="sidebar-nav">

      <div class="nav-section">Overview</div>

      <a href="/dashboard" class="nav-item {% if active=='dashboard' %}active{% endif %}">
        <span class="nav-item-icon">&#9632;</span>
        控制台
      </a>
      <a href="/network" class="nav-item {% if active=='network' %}active{% endif %}">
        <span class="nav-item-icon">&#9670;</span>
        网络配置
      </a>

      <div class="nav-section">Device</div>

      <a href="/upgrade" class="nav-item {% if active=='upgrade' %}active{% endif %}">
        <span class="nav-item-icon">&#8679;</span>
        固件升级
      </a>
      <a href="/diagnostics" class="nav-item {% if active=='diagnostics' %}active{% endif %}">
        <span class="nav-item-icon">&#9741;</span>
        运行诊断
      </a>

      <div class="nav-section">DevOps</div>

      <a href="/artifacts" class="nav-item {% if active=='artifacts' %}active{% endif %}">
        <span class="nav-item-icon">&#9723;</span>
        固件制品
      </a>
      <a href="/jobs" class="nav-item {% if active=='jobs' %}active{% endif %}">
        <span class="nav-item-icon">&#9654;</span>
        升级任务
      </a>
      <a href="/stats" class="nav-item {% if active=='stats' %}active{% endif %}">
        <span class="nav-item-icon">&#9636;</span>
        实验统计
      </a>

    </div>

    <div class="sidebar-footer">Mock Mode &middot; v1.0</div>
  </nav>

  <!-- Page Container -->
  <div class="page-container">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">{% block page_title %}{% endblock %}</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-badge">Mock Mode</span>
        <span class="topbar-badge">Local Jenkins</span>
        <div class="topbar-user">
          <div class="user-avatar">A</div>
          <span class="user-name">admin</span>
        </div>
        <a href="/logout" class="topbar-logout">&#10006; 退出</a>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

  </div>

</div>
</body>
</html>
