services:
  # ------------------------------------------------------------------
  # Mock CPE Flask Web Application
  # ------------------------------------------------------------------
  mock-cpe:
    build: .
    container_name: mock-cpe
    ports:
      - "5000:5000"
    environment:
      MOCK_CPE_DEVICE_DELAY_SCALE: "${MOCK_CPE_DEVICE_DELAY_SCALE:-0}"
      APP_BUILD_VERSION: "${APP_BUILD_VERSION:-local-dev}"
      APP_BUILD_NUMBER: "${APP_BUILD_NUMBER:-}"
      APP_BUILD_URL: "${APP_BUILD_URL:-}"
      APP_FIRMWARE_BASELINE: "${APP_FIRMWARE_BASELINE:-}"
      APP_FIRMWARE_TARGET: "${APP_FIRMWARE_TARGET:-}"
    volumes:
      - mock_cpe_data:/app/data
    networks:
      - test-net
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Selenium Standalone Chrome (headless remote WebDriver)
  # ------------------------------------------------------------------
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium-chrome
    ports:
      - "4444:4444"
    shm_size: "2g"
    environment:
      SE_NODE_MAX_SESSIONS: "4"
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_NODE_SESSION_TIMEOUT: "300"
      SE_VNC_NO_PASSWORD: "1"
      SE_VNC_VIEW_ONLY: "1"
    networks:
      - test-net
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Test Runner — runs pytest with Allure + coverage
  # ------------------------------------------------------------------
  test-runner:
    build: .
    container_name: test-runner
    environment:
      BASE_URL: "http://mock-cpe:5000"
      SELENIUM_REMOTE_URL: "http://selenium:4444/wd/hub"
      HEADLESS: "1"
      MOCK_CPE_DEVICE_DELAY_SCALE: "${MOCK_CPE_DEVICE_DELAY_SCALE:-0}"
      PYTEST_ARGS: "${PYTEST_ARGS:-tests -v --tb=short}"
    volumes:
      - test_reports:/app/reports
      - test_allure_results:/app/allure-results
      - test_screenshots:/app/screenshots
    networks:
      - test-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Running: pytest $${PYTEST_ARGS} ==="
        mkdir -p /app/reports /app/allure-results /app/screenshots
        eval "python -m pytest $${PYTEST_ARGS}"
        status=$$?
        echo "=== Tests finished with exit code $${status} ==="
        exit $${status}

networks:
  test-net:
    driver: bridge

volumes:
  mock_cpe_data:
  test_reports:
  test_allure_results:
  test_screenshots:
